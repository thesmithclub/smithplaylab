<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 별 운전습관 — THE SMITH</title>
  <meta name="description" content="재미로 알아보는 MBTI 별 운전습관">
  <meta property="og:title" content="MBTI 별 운전습관">
  <meta property="og:description" content="나의 MBTI로 알아보는 운전 스타일은?">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🚗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
  :root {
    --bg:      #FFFFFF;
    --bg-2:    #F7F7FB;
    --bg-3:    #EFEFF5;
    --line:    #E2E2EC;
    --line-2:  #CECEDE;
    --muted:   #9090AC;
    --soft:    #606080;
    --body:    #303050;
    --loud:    #141428;
    --black:   #06060E;
    --accent:  #1A1AFF;
    --accent-dim: rgba(26,26,255,.08);
    --pink:    #FF2D78;
    --lime:    #88CC00;
    --amber:   #FF9900;
    --font-d: 'Space Grotesk', sans-serif;
    --font-m: 'JetBrains Mono', monospace;
    --ease:   cubic-bezier(.25,.46,.45,.94);
    --spring: cubic-bezier(.34,1.56,.64,1);
    --gutter: clamp(20px, 5vw, 64px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; color-scheme: light; }
  body {
    background: var(--bg);
    color: var(--body);
    font-family: var(--font-d);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; border: none; background: none; cursor: pointer; }

  /* ── PROGRESS ── */
  #prog { position: fixed; top: 0; left: 0; height: 2px; width: 0; background: var(--accent); z-index: 1000; transition: width .1s; }

  /* ── WRAP ── */
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 var(--gutter); }

  /* ── HEADER ── */
  header {
    padding: 72px 0 56px;
    text-align: center;
  }
  .header-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-m); font-size: 10px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--line); border-radius: 99px;
    padding: 5px 14px; margin-bottom: 28px;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);} }

  .header-title {
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 800; letter-spacing: -.04em;
    line-height: .95; color: var(--black);
    margin-bottom: 20px;
  }
  .header-title span { color: var(--accent); }
  .header-sub {
    font-family: var(--font-m); font-size: 13px;
    color: var(--muted); letter-spacing: .02em;
  }

  /* ── SELECTOR CARD ── */
  .selector-card {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 20px; padding: 40px;
    margin-bottom: 32px;
  }
  .selector-title {
    font-family: var(--font-m); font-size: 10px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 28px; text-align: center;
  }

  .axis {
    display: flex; flex-direction: column; gap: 20px;
    margin-bottom: 36px;
  }
  .axis-row {
    display: flex; align-items: center; gap: 12px;
  }
  .axis-label {
    font-family: var(--font-m); font-size: 9px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted);
    width: 20px; flex-shrink: 0; text-align: center;
  }
  .axis-btns {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; flex: 1;
  }
  .opt-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 14px 12px; border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    color: var(--soft);
    transition: all .18s var(--ease);
    position: relative; overflow: hidden;
  }
  .opt-btn .letter {
    font-family: var(--font-d); font-weight: 800;
    font-size: 22px; letter-spacing: -.03em;
    color: var(--loud); line-height: 1;
    transition: color .18s;
  }
  .opt-btn .word {
    font-family: var(--font-m); font-size: 9px;
    letter-spacing: .06em; color: var(--muted);
    transition: color .18s;
  }
  .opt-btn:hover {
    border-color: var(--line-2);
    background: var(--bg-3);
  }
  .opt-btn.on {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .opt-btn.on .letter { color: var(--accent); }
  .opt-btn.on .word   { color: var(--accent); opacity: .7; }

  /* ── CTA ── */
  .cta-row {
    display: flex; gap: 10px;
  }
  #result-indicator {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border: 1.5px solid var(--line);
    border-radius: 12px; padding: 14px 20px;
    font-family: var(--font-m); font-size: 18px; font-weight: 700;
    letter-spacing: .1em; color: var(--muted);
    transition: all .3s var(--spring);
    min-width: 100px;
  }
  #result-indicator.ready { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  #search-btn {
    flex-shrink: 0;
    padding: 14px 32px; border-radius: 12px;
    background: var(--black); color: var(--bg);
    font-family: var(--font-d); font-size: 15px; font-weight: 700;
    letter-spacing: -.01em;
    transition: all .2s var(--spring);
    opacity: .4; pointer-events: none;
  }
  #search-btn.active { opacity: 1; pointer-events: auto; }
  #search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
  #search-btn:active { transform: none; }

  /* ── RESULT ── */
  #result-section {
    display: none;
    animation: fadeUp .5s var(--ease) both;
  }
  #result-section.on { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;} }

  .result-card {
    border: 1.5px solid var(--line-2);
    border-radius: 20px; overflow: hidden;
    margin-bottom: 20px;
  }
  .result-header {
    padding: 36px 36px 24px;
    border-bottom: 1px solid var(--line);
  }
  .result-type-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-m); font-size: 9px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px;
  }
  .result-mbti {
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 800; letter-spacing: -.04em;
    color: var(--black); line-height: .9;
    margin-bottom: 8px;
  }
  .result-name {
    font-family: var(--font-m); font-size: 13px;
    color: var(--accent); letter-spacing: .04em;
    margin-bottom: 4px;
  }
  .result-nick {
    font-size: 15px; font-weight: 600;
    color: var(--loud); letter-spacing: -.01em;
  }

  .result-body { padding: 32px 36px; }
  .result-summary {
    font-size: 16px; font-weight: 600; line-height: 1.6;
    color: var(--loud); letter-spacing: -.01em;
    margin-bottom: 28px; padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }

  .traits-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 28px;
  }
  .trait-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 14px; border-radius: 10px;
    background: var(--bg-2); border: 1px solid var(--line);
  }
  .trait-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .trait-text { font-size: 12px; color: var(--body); line-height: 1.5; }
  .trait-text strong { display: block; font-size: 11px; font-weight: 700; color: var(--loud); margin-bottom: 2px; font-family: var(--font-m); letter-spacing: .04em; text-transform: uppercase; }

  .result-quote {
    padding: 20px 24px; border-radius: 12px;
    background: var(--accent-dim); border-left: 3px solid var(--accent);
    font-family: var(--font-m); font-size: 13px; color: var(--body);
    font-style: italic; line-height: 1.7;
  }
  .result-quote::before { content: '"'; font-style: normal; font-size: 20px; color: var(--accent); margin-right: 4px; }
  .result-quote::after  { content: '"'; font-style: normal; font-size: 20px; color: var(--accent); margin-left: 4px; }

  /* ── SHARE ── */
  .share-card {
    border: 1px solid var(--line); border-radius: 16px;
    padding: 28px 32px;
    background: var(--bg-2);
  }
  .share-title {
    font-family: var(--font-m); font-size: 10px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px;
  }
  .share-btns {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .share-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 18px; border-radius: 10px;
    font-family: var(--font-d); font-size: 13px; font-weight: 600;
    transition: all .18s;
    border: 1.5px solid var(--line);
    background: var(--bg); color: var(--loud);
  }
  .share-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }
  .share-btn .si { font-size: 15px; }
  .share-btn.btn-x        { border-color: #000; }
  .share-btn.btn-x:hover  { background: #000; color: #fff; }
  .share-btn.btn-ig:hover { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color: #fff; border-color: transparent; }
  .share-btn.btn-th:hover { background: #000; color: #fff; border-color: #000; }
  .share-btn.btn-tt:hover { background: #000; color: #fff; border-color: #000; }
  .share-btn.btn-copy.copied { background: var(--lime); color: var(--black); border-color: var(--lime); }

  /* ── RESET ── */
  .reset-row {
    text-align: center; margin-top: 28px;
  }
  #reset-btn {
    font-family: var(--font-m); font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 24px; transition: all .18s;
  }
  #reset-btn:hover { color: var(--black); border-color: var(--black); }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 48px 0 56px;
    border-top: 1px solid var(--line); margin-top: 64px;
  }
  .footer-brand { font-family: var(--font-m); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
  .footer-sub { font-size: 11px; color: var(--muted); margin-top: 4px; opacity: .6; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .selector-card { padding: 24px 20px; }
    .traits-grid { grid-template-columns: 1fr; }
    .result-header, .result-body { padding: 24px 20px; }
    .share-card { padding: 20px; }
    .cta-row { flex-direction: column; }
  }
  </style>
</head>
<body>

<div id="prog"></div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-badge">
      <span class="badge-dot"></span>
      FUN · THE SMITH PLAYGROUND
    </div>
    <h1 class="header-title">MBTI 별<br><span>운전습관</span></h1>
    <p class="header-sub">재미로 알아보는 나의 MBTI 운전 스타일</p>
  </header>

  <!-- SELECTOR -->
  <div class="selector-card">
    <p class="selector-title">나의 MBTI를 선택하세요</p>

    <div class="axis">

      <div class="axis-row">
        <span class="axis-label">1</span>
        <div class="axis-btns">
          <button class="opt-btn" data-axis="EI" data-val="E">
            <span class="letter">E</span>
            <span class="word">외향형</span>
          </button>
          <button class="opt-btn" data-axis="EI" data-val="I">
            <span class="letter">I</span>
            <span class="word">내향형</span>
          </button>
        </div>
      </div>

      <div class="axis-row">
        <span class="axis-label">2</span>
        <div class="axis-btns">
          <button class="opt-btn" data-axis="NS" data-val="N">
            <span class="letter">N</span>
            <span class="word">직관형</span>
          </button>
          <button class="opt-btn" data-axis="NS" data-val="S">
            <span class="letter">S</span>
            <span class="word">감각형</span>
          </button>
        </div>
      </div>

      <div class="axis-row">
        <span class="axis-label">3</span>
        <div class="axis-btns">
          <button class="opt-btn" data-axis="TF" data-val="T">
            <span class="letter">T</span>
            <span class="word">사고형</span>
          </button>
          <button class="opt-btn" data-axis="TF" data-val="F">
            <span class="letter">F</span>
            <span class="word">감정형</span>
          </button>
        </div>
      </div>

      <div class="axis-row">
        <span class="axis-label">4</span>
        <div class="axis-btns">
          <button class="opt-btn" data-axis="JP" data-val="J">
            <span class="letter">J</span>
            <span class="word">판단형</span>
          </button>
          <button class="opt-btn" data-axis="JP" data-val="P">
            <span class="letter">P</span>
            <span class="word">인식형</span>
          </button>
        </div>
      </div>

    </div>

    <div class="cta-row">
      <div id="result-indicator">? ? ? ?</div>
      <button id="search-btn">조회하기</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-section">
    <div class="result-card">
      <div class="result-header">
        <div class="result-type-badge">
          <span id="res-cat"></span>
        </div>
        <div class="result-mbti" id="res-mbti"></div>
        <div class="result-name" id="res-name"></div>
        <div class="result-nick" id="res-nick"></div>
      </div>
      <div class="result-body">
        <p class="result-summary" id="res-summary"></p>
        <div class="traits-grid" id="res-traits"></div>
        <div class="result-quote" id="res-quote"></div>
      </div>
    </div>

    <div class="share-card">
      <p class="share-title">결과 공유하기</p>
      <div class="share-btns">
        <button class="share-btn btn-x"    onclick="shareX()">     <span class="si">𝕏</span> X (Twitter)</button>
        <button class="share-btn btn-ig"   onclick="shareIG()">    <span class="si">📸</span> Instagram</button>
        <button class="share-btn btn-th"   onclick="shareThreads()"><span class="si">🧵</span> Threads</button>
        <button class="share-btn btn-tt"   onclick="shareTikTok()"> <span class="si">🎵</span> TikTok</button>
        <button class="share-btn btn-copy" id="copy-btn" onclick="copyURL()"><span class="si">🔗</span> URL 복사</button>
      </div>
    </div>

    <div class="reset-row">
      <button id="reset-btn" onclick="resetAll()">← 다시 선택하기</button>
    </div>
  </div>

</div>

<footer>
  <div class="wrap">
    <p class="footer-brand">THE SMITH PLAYGROUND LAB</p>
    <p class="footer-sub">재미로 보는 콘텐츠입니다 · © 2026</p>
  </div>
</footer>

/* ── STATE ─────────────────────────────────────────────── */
const selected = { EI: null, NS: null, TF: null, JP: null };

/* ── SELECTOR ──────────────────────────────────────────── */
document.querySelectorAll('.opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const axis = btn.dataset.axis;
    // deselect same axis
    document.querySelectorAll(`.opt-btn[data-axis="${axis}"]`).forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    selected[axis] = btn.dataset.val;
    updateIndicator();
  });
});

function updateIndicator() {
  const ind = document.getElementById('result-indicator');
  const searchBtn = document.getElementById('search-btn');
  const parts = [
    selected.EI || '?',
    selected.NS || '?',
    selected.TF || '?',
    selected.JP || '?'
  ];
  const complete = !parts.includes('?');
  ind.textContent = parts.join('');
  ind.classList.toggle('ready', complete);
  searchBtn.classList.toggle('active', complete);
}

/* ── SEARCH ────────────────────────────────────────────── */
document.getElementById('search-btn').addEventListener('click', () => {
  const mbti = [selected.EI, selected.NS, selected.TF, selected.JP].join('');
  showResult(mbti);
});

function showResult(mbti) {
  const d = MBTI_DATA[mbti];
  if (!d) return;

  document.getElementById('res-mbti').textContent = mbti;
  document.getElementById('res-name').textContent = d.name;
  document.getElementById('res-nick').textContent = '— ' + d.nick;
  document.getElementById('res-cat').textContent = d.cat;
  document.getElementById('res-summary').textContent = d.summary;
  document.getElementById('res-quote').textContent = d.quote;

  document.getElementById('res-traits').innerHTML = d.traits.map(t => `
    <div class="trait-item">
      <span class="trait-icon">${t.icon}</span>
      <div class="trait-text">
        <strong>${t.title}</strong>
        ${t.text}
      </div>
    </div>
  `).join('');

  const sec = document.getElementById('result-section');
  sec.classList.remove('on');
  void sec.offsetWidth; // reflow for animation
  sec.classList.add('on');
  setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

/* ── RESET ─────────────────────────────────────────────── */
function resetAll() {
  Object.keys(selected).forEach(k => selected[k] = null);
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('on'));
  updateIndicator();
  document.getElementById('result-section').classList.remove('on');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── SHARE ─────────────────────────────────────────────── */
function getShareText() {
  const mbti = [selected.EI, selected.NS, selected.TF, selected.JP].join('');
  const d = MBTI_DATA[mbti];
  if (!d) return '';
  return `나의 MBTI ${mbti} "${d.name}"의 운전습관은?\n"${d.quote}"\n\n재미로 알아보는 MBTI 별 운전습관 👉`;
}

function shareX() {
  const text = encodeURIComponent(getShareText() + ' ' + window.location.href);
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
}

function shareIG() {
  copyURL();
  alert('URL이 복사되었습니다!\nInstagram 스토리 링크에 붙여넣기 하세요 📸');
}

function shareThreads() {
  const text = encodeURIComponent(getShareText() + ' ' + window.location.href);
  window.open(`https://www.threads.net/intent/post?text=${text}`, '_blank');
}

function shareTikTok() {
  copyURL();
  alert('URL이 복사되었습니다!\nTikTok 영상 설명에 붙여넣기 하세요 🎵');
}

function copyURL() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.querySelector('.si').textContent = '✓';
    btn.childNodes[1].textContent = ' 복사됨!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('.si').textContent = '🔗';
      btn.childNodes[1].textContent = ' URL 복사';
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* ── PROGRESS ──────────────────────────────────────────── */
window.addEventListener('scroll', () => {
  const dh = document.documentElement.scrollHeight - window.innerHeight;
  if (dh > 0) document.getElementById('prog').style.width = Math.min(window.scrollY / dh * 100, 100) + '%';
}, { passive: true });
</script>
